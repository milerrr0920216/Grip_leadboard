<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>握力挑戰排行榜</title>
    <style>
        :root { 
            --primary-color: #2E75B6; 
            --female-color: #E06666; 
            --text-color: #333;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            color: var(--text-color);
            background: linear-gradient(-45deg, #ff9a44, #fc6076, #00c6ff, #0072ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            padding: 2rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 900px; 
            border: 1px solid rgba(255,255,255,0.4); 
            margin-top: 2vh;
        }

        h1 { text-align: center; color: #222; margin-bottom: 1.5rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        .input-group { 
            display: flex; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; 
            background: rgba(255,255,255,0.6); padding: 15px; border-radius: 10px; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        input, select { 
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; 
            background: rgba(255,255,255,0.9); font-size: 1rem; outline: none; min-width: 120px;
        }
        input:focus, select:focus { border-color: var(--primary-color); }
        
        button { 
            padding: 12px 20px; background: linear-gradient(135deg, var(--primary-color), #1e5a8f); 
            color: white; cursor: pointer; border: none; font-weight: bold; 
            border-radius: 8px; font-size: 1rem; transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }

        .boards-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .board { 
            flex: 1; min-width: 300px; background: rgba(255,255,255,0.7); 
            border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .board h2 { text-align: center; color: white; padding: 15px; margin: 0; font-size: 1.2rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .male-board h2 { background: var(--primary-color); }
        .female-board h2 { background: var(--female-color); }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); text-align: center; }
        th { background: rgba(0,0,0,0.04); font-weight: bold; }
        tr:hover { background: rgba(255,255,255,0.9); }

        .rank-1 td { font-weight: bold; color: #b8860b; background-color: rgba(255, 215, 0, 0.15) !important; }
        .rank-2 td { font-weight: bold; color: #708090; background-color: rgba(192, 192, 192, 0.15) !important; }
        .rank-3 td { font-weight: bold; color: #cd7f32; background-color: rgba(205, 127, 50, 0.15) !important; }

        /* 刪除按鈕專屬樣式 */
        .delete-btn {
            background: none; border: none; color: #ff4c4c; cursor: pointer;
            font-size: 1.2rem; padding: 5px; margin: 0; box-shadow: none;
        }
        .delete-btn:hover { background: #ffeded; border-radius: 5px; transform: scale(1.1); box-shadow: none;}

        .loading-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.7); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; z-index: 100; 
            font-size: 1.5rem; font-weight: bold; color: var(--primary-color);
        }
        .spinner {
            margin-right: 15px; width: 30px; height: 30px; border: 4px solid var(--primary-color);
            border-top: 4px solid transparent; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">
        <div class="spinner"></div> ⏳ 資料同步至 Google Sheets 中...
    </div>

    <div class="container">
        <h1>👊 慈濟大學 物治週 握力挑戰排行榜 👊</h1>
        
        <div class="input-group">
            <select id="genderInput">
                <option value="male">男</option>
                <option value="female">女</option>
            </select>
            <input type="text" id="nameInput" placeholder="輸入姓名">
            <input type="text" id="deptInput" placeholder="輸入系級">
            <input type="number" id="scoreInput" placeholder="分數 (kg)" step="0.1">
            <button onclick="addRecord()">🚀 送出成績</button>
        </div>

        <div class="boards-container">
            <div class="board male-board">
                <h2>男子組戰況 🔵</h2>
                <table>
                    <thead><tr><th>排名</th><th>姓名</th><th>系級</th><th>分數</th><th>操作</th></tr></thead>
                    <tbody id="maleTableBody"></tbody>
                </table>
            </div>
            <div class="board female-board">
                <h2>女子組戰況 🔴</h2>
                <table>
                    <thead><tr><th>排名</th><th>姓名</th><th>系級</th><th>分數</th><th>操作</th></tr></thead>
                    <tbody id="femaleTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🚨 記得把這裡的網址換成你的 Google Apps Script (GAS) 部署網址！
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwOC9-kVWmaGFil-2yHdkTNwHtLAOGfL9z0cnztnL-GlSCP_c6jJFOJP8mefTqFFhpj/exec';

        let records = JSON.parse(localStorage.getItem('gripCloudData')) || [];
        updateTables();

        async function addRecord() {
            const data = {
                id: Date.now(), // 🌟 新增一組獨一無二的 ID，用來精準刪除資料
                gender: document.getElementById('genderInput').value,
                name: document.getElementById('nameInput').value.trim(),
                dept: document.getElementById('deptInput').value.trim(),
                score: parseFloat(document.getElementById('scoreInput').value)
            };

            if (!data.name || !data.dept || isNaN(data.score)) {
                alert("請完整填寫姓名、系級與有效分數！"); return;
            }

            document.getElementById('loading').style.display = 'flex';

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                records.push(data);
                localStorage.setItem('gripCloudData', JSON.stringify(records));
                updateTables();

                document.getElementById('nameInput').value = '';
                document.getElementById('deptInput').value = '';
                document.getElementById('scoreInput').value = '';
                document.getElementById('nameInput').focus();

            } catch (error) {
                console.error('Error!', error.message);
                alert("同步失敗，請檢查網路連接。");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 🌟 修復版的刪除功能（完美相容無 ID 的舊資料）
        function deleteRecord(recordId) {
            const pwd = prompt("🗑️ 要刪除這筆紀錄嗎？\n請輸入管理員密碼 (預設: 8888)：");
            
            if (pwd === "8888") {
                // 修復：檢查每一筆資料有沒有 ID，如果有就用 ID 比對，沒有就用 名字+分數 比對
                records = records.filter(r => {
                    const currentId = r.id ? r.id.toString() : `${r.name}-${r.score}`;
                    return currentId !== recordId.toString();
                });
                
                // 存回瀏覽器快取
                localStorage.setItem('gripCloudData', JSON.stringify(records));
                
                // 更新畫面
                updateTables();
                alert("✅ 畫面上的紀錄已徹底刪除！\n(重整也不會再跑出來了)");
            } else if (pwd !== null) {
                alert("❌ 密碼錯誤，取消刪除！");
            }
        }

        function updateTables() {
            records.sort((a, b) => b.score - a.score);
            
            const render = (id, gender) => {
                const tbody = document.getElementById(id);
                tbody.innerHTML = '';
                
                const filtered = records.filter(r => r.gender === gender);
                
                filtered.forEach((r, i) => {
                    const rank = i + 1;
                    let rankDisplay = rank;
                    if (rank === 1) rankDisplay = '🥇 1';
                    if (rank === 2) rankDisplay = '🥈 2';
                    if (rank === 3) rankDisplay = '🥉 3';

                    const tr = document.createElement('tr');
                    if (rank <= 3) tr.classList.add(`rank-${rank}`);
                    
                    // 確保舊資料即使沒有 ID 也能用名字+分數作為辨識基礎
                    const uniqueId = r.id ? r.id : `${r.name}-${r.score}`;

                    tr.innerHTML = `
                        <td>${rankDisplay}</td>
                        <td>${r.name}</td>
                        <td>${r.dept}</td>
                        <td>${r.score.toFixed(1)}</td>
                        <td><button class="delete-btn" onclick="deleteRecord('${uniqueId}')" title="刪除此紀錄">❌</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            };
            
            render('maleTableBody', 'male');
            render('femaleTableBody', 'female');
        }
    </script>
</body>
</html>
