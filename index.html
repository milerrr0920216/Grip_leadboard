<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪 握力挑戰排行榜 - 最終對決</title>
    <style>
        :root {
            --primary-color: #2E75B6;
            --female-color: #E06666;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
        }

        input[type="text"], input[type="number"], select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            min-width: 130px;
        }

        button {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }

        button:hover { background-color: #1e5a8f; }

        .boards-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .board {
            flex: 1;
            min-width: 300px;
        }

        .board h2 {
            text-align: center;
            padding: 10px;
            border-radius: 8px 8px 0 0;
            margin-bottom: 0;
            color: white;
        }

        .male-board h2 { background-color: var(--primary-color); }
        .female-board h2 { background-color: var(--female-color); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f1f1f1;
            color: #333;
            font-weight: bold;
        }

        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f1f1; }

        /* 前三名特殊樣式 */
        .rank-1 td { font-weight: bold; color: #d4af37; background-color: #fff9e6 !important; }
        .rank-2 td { font-weight: bold; color: #a9a9a9; background-color: #f5f5f5 !important; }
        .rank-3 td { font-weight: bold; color: #cd7f32; background-color: #fdf5e6 !important; }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .export-btn { background-color: #4CAF50; flex: 1; }
        .export-btn:hover { background-color: #45a049; }
        .danger-btn { background-color: #ff4c4c; flex: 1;}
        .danger-btn:hover { background-color: #e60000; }
    </style>
</head>
<body>

    <div class="container">
        <h1>💪 握力挑戰雙榜爭霸</h1>
        
        <div class="input-group">
            <select id="genderInput" required>
                <option value="male">男</option>
                <option value="female">女</option>
            </select>
            <input type="text" id="nameInput" placeholder="姓名 (例: 李小明)" required>
            <input type="text" id="deptInput" placeholder="系級 (例: 物治二)" required>
            <input type="number" id="scoreInput" placeholder="分數 (kg)" step="0.1" required>
            <button onclick="addRecord()">➕ 新增紀錄</button>
        </div>

        <div class="boards-container">
            <div class="board male-board">
                <h2>男子組排行榜 🔵</h2>
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>姓名</th>
                            <th>系級</th>
                            <th>分數(kg)</th>
                        </tr>
                    </thead>
                    <tbody id="maleTableBody"></tbody>
                </table>
            </div>

            <div class="board female-board">
                <h2>女子組排行榜 🔴</h2>
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>姓名</th>
                            <th>系級</th>
                            <th>分數(kg)</th>
                        </tr>
                    </thead>
                    <tbody id="femaleTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let records = [];

        window.onload = function() {
            const savedData = localStorage.getItem('gripRankingsV2');
            if (savedData) {
                records = JSON.parse(savedData);
                updateTables();
            }
        };

        function addRecord() {
            const gender = document.getElementById('genderInput').value;
            const name = document.getElementById('nameInput').value.trim();
            const dept = document.getElementById('deptInput').value.trim();
            const score = parseFloat(document.getElementById('scoreInput').value);

            if (!name || !dept || isNaN(score)) {
                alert("請完整填寫名稱、系級與有效的分數！");
                return;
            }

            records.push({ gender, name, dept, score });

            document.getElementById('nameInput').value = '';
            document.getElementById('deptInput').value = '';
            document.getElementById('scoreInput').value = '';
            document.getElementById('nameInput').focus();

            updateTables();
        }

        function renderTable(tbodyId, filteredRecords) {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = ''; 

            filteredRecords.forEach((record, index) => {
                const rank = index + 1;
                const tr = document.createElement('tr');
                if (rank <= 3) tr.classList.add(`rank-${rank}`);

                let rankDisplay = rank;
                if (rank === 1) rankDisplay = '🥇 1';
                if (rank === 2) rankDisplay = '🥈 2';
                if (rank === 3) rankDisplay = '🥉 3';

                tr.innerHTML = `
                    <td>${rankDisplay}</td>
                    <td>${record.name}</td>
                    <td>${record.dept}</td>
                    <td>${record.score.toFixed(1)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateTables() {
            records.sort((a, b) => b.score - a.score);
            localStorage.setItem('gripRankingsV2', JSON.stringify(records));

            const maleRecords = records.filter(r => r.gender === 'male');
            const femaleRecords = records.filter(r => r.gender === 'female');

            renderTable('maleTableBody', maleRecords);
            renderTable('femaleTableBody', femaleRecords);
        }

        function clearData() {
            if (confirm("確定要清除所有排名資料嗎？")) {
                records = [];
                localStorage.removeItem('gripRankingsV2');
                updateTables();
            }
        }

        // 匯出成 CSV 的函數
        function exportToCSV() {
            if (records.length === 0) {
                alert("目前沒有資料可以匯出喔！");
                return;
            }

            // 處理 BOM 以防 Excel 開啟中文亂碼
            let csvContent = "\uFEFF性別,姓名,系級,分數(kg)\n";

            records.forEach(row => {
                let genderText = row.gender === 'male' ? '男' : '女';
                csvContent += `${genderText},${row.name},${row.dept},${row.score}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", "握力測驗排行榜資料.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
